name: Build OfficeToPDF

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App And Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ 
          releaseName: 'App v__VERSION__'
          releaseBody: '本版本由 GitHub Actions 自动化构建，请在 Assets 处下载最终独立版 .exe 运行。'
          releaseDraft: false
          prerelease: false

      - name: Upload Standalone Executable
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "app-v$version"
          $exePath = "src-tauri\target\release\office2pdf.exe"
          $newName = "office2pdf_$version`_standalone.exe"
          Copy-Item $exePath $newName
          gh release upload $tag $newName --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
