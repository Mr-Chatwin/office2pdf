<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>office2pdf — 极速跨端文档转换工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>office2pdf</h1>
            </div>
            <div style="margin-top:8px; margin-bottom: 5px;">
                <span class="badge" style="background:#1e3e70; color:#fff; padding:4px 8px; border-radius:4px; font-size:12px; margin-right:6px;">📝 Word</span>
                <span class="badge" style="background:#105c31; color:#fff; padding:4px 8px; border-radius:4px; font-size:12px; margin-right:6px;">📗 Excel</span>
                <span class="badge" style="background:#9b3318; color:#fff; padding:4px 8px; border-radius:4px; font-size:12px;">📊 PPT</span>
            </div>
            <p class="subtitle">加载中...</p>
        </header>

        <main class="app-main">
            <div id="setupSection" class="setup-section hidden">
                <div class="setup-card">
                    <div class="setup-icon">🔧</div>
                    <h2>首次使用，需要下载转换引擎</h2>
                    <p class="setup-desc">下载 LibreOffice 转换引擎（无需安装，全自动下载配置），完成后即可离线使用。</p>
                    <button id="downloadLoBtn" class="btn btn-primary btn-lg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        开始下载
                    </button>
                    <div id="loProgress" class="lo-progress hidden">
                        <div class="progress-info">
                            <span id="loProgressText" class="progress-text">准备中...</span>
                            <span id="loProgressPercent" class="progress-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div id="loProgressFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="dropZone" class="drop-zone hidden">
                <div class="drop-zone-content">
                    <div class="drop-zone-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <h2>拖拽 Office 文件到这里</h2>
                    <p>或 <label id="fileInputLabel" class="file-label" style="cursor:pointer">点击选择文件</label></p>
                    <p class="drop-zone-hint">支持 .docx / .xlsx / .pptx 以及对应的老版本格式格式，可同时拖放</p>
                </div>
            </div>

            <div id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2 id="resultsTitle">待转换文件</h2>
                    <div class="results-actions">
                        <button id="startConvertBtn" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            开始转换
                        </button>
                        <button id="stopConvertBtn" class="btn btn-danger hidden">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                            停止
                        </button>
                        <button id="addMoreBtn" class="btn btn-ghost">添加文件</button>
                        <button id="newConvertBtn" class="btn btn-ghost">清空列表</button>
                    </div>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>
        </main>

        <footer class="app-footer">
            <p>🔒 所有文件在本地处理，不会上传到任何服务器 | Tauri 高性能极速版本</p>
        </footer>
    </div>

    <!-- Tauri 注入后可用 window.__TAURI__ -->
    <script src="js/app.js"></script>
</body>
</html>
