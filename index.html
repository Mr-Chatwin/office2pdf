<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 转 PDF — 在线转换工具</title>
    <meta name="description" content="PPT 转 PDF 工具，高质量转换，隐私安全。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>PPT → PDF</h1>
            </div>
            <p class="subtitle">高质量转换 · 文件不离开本地 · 隐私安全</p>
        </header>

        <main class="app-main">
            <!-- LibreOffice 安装/下载区域 (Electron 模式) -->
            <div id="setupSection" class="setup-section hidden">
                <div class="setup-card">
                    <div class="setup-icon">🔧</div>
                    <h2>首次使用，需要下载转换引擎</h2>
                    <p class="setup-desc">下载 LibreOffice 转换引擎（约 350MB），下载后即可离线使用。</p>
                    <button id="downloadLoBtn" class="btn btn-primary btn-lg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        开始下载
                    </button>
                    <div id="loProgress" class="lo-progress hidden">
                        <div class="progress-info">
                            <span id="loProgressText" class="progress-text">准备中...</span>
                            <span id="loProgressPercent" class="progress-percent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div id="loProgressFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 上传区域 -->
            <div id="dropZone" class="drop-zone">
                <div class="drop-zone-content">
                    <div class="drop-zone-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <h2>拖拽 PPT 文件到这里</h2>
                    <p>或者 <label for="fileInput" class="file-label">点击选择文件</label></p>
                    <p class="drop-zone-hint">支持 .pptx / .ppt 格式，可同时拖入多个文件</p>
                </div>
                <input type="file" id="fileInput" accept=".pptx,.ppt,.ppsx,.pps" multiple hidden>
            </div>

            <!-- 进度区域 (Web 模式) -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-card">
                    <div class="progress-info">
                        <span id="progressText" class="progress-text">正在解析...</span>
                        <span id="progressPercent" class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
            </div>

            <!-- 预览区域 (Web 模式) -->
            <div id="previewSection" class="preview-section hidden">
                <div class="preview-header">
                    <div class="file-info">
                        <span class="file-icon">📊</span>
                        <div>
                            <h2 id="fileName" class="file-name">文件名.pptx</h2>
                            <p id="slideCount" class="slide-count">0 页幻灯片</p>
                        </div>
                    </div>
                    <div class="preview-actions">
                        <button id="exportBtn" class="btn btn-primary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            导出 PDF
                        </button>
                        <button id="resetBtn" class="btn btn-ghost">重新选择</button>
                    </div>
                </div>
                <div id="slidePreview" class="slide-preview"></div>
            </div>

            <!-- 转换结果区域 (Electron 模式) -->
            <div id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2 id="resultsTitle">待转换文件</h2>
                    <div class="results-actions">
                        <button id="startConvertBtn" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            开始转换
                        </button>
                        <button id="stopConvertBtn" class="btn btn-danger hidden">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                            停止
                        </button>
                        <button id="newConvertBtn" class="btn btn-ghost">清空列表</button>
                    </div>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>

            <!-- 离屏渲染区域 (Web 模式) -->
            <div id="renderArea" class="render-area"></div>
        </main>

        <footer class="app-footer">
            <p>🔒 所有文件在本地处理，不会上传到任何服务器</p>
        </footer>
    </div>

    <!-- 外部依赖 (仅 Web 模式需要) -->
    <script>
        if (!window.electronAPI) {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>');
            document.write('<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"><\/script>');
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>');
            document.write('<script src="js/pptx-parser.js"><\/script>');
            document.write('<script src="js/slide-renderer.js"><\/script>');
            document.write('<script src="js/pdf-exporter.js"><\/script>');
        }
    </script>
    <script src="js/app.js"></script>
</body>
</html>
